name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Windows and publish GitHub Release
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # CI 无代码签名证书时跳过自动发现，避免 electron-builder 卡在签名步骤
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v1.2.3 (got: $TAG)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Use locked npm version
        run: npm install --global npm@9.6.5

      - name: Sync package.json version with tag
        shell: bash
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native Electron dependencies
        run: npx --no-install electron-builder install-app-deps

      - name: Build Windows installer and portable zip
        run: npm run dist

      - name: Verify release artifacts
        run: npm run release:verify

      - name: Collect release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $body = "DBPanda $tag"
          $path = "release-notes.md"
          if (Test-Path -LiteralPath $path) {
            $raw = Get-Content -Raw -LiteralPath $path
            $pattern = "(?ms)^##\s+v$([regex]::Escape($version))\s*[^\r\n]*\r?\n(.*?)(?=^##\s+v|\z)"
            $match = [regex]::Match($raw, $pattern)
            if ($match.Success -and -not [string]::IsNullOrWhiteSpace($match.Groups[1].Value)) {
              $body = $match.Groups[1].Value.Trim()
            }
          }
          $delimiter = "RELEASE_NOTES_" + [guid]::NewGuid().ToString("N")
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DBPanda ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          # exe/zip 已由 verify 保证；blockmap / latest.yml 有则上传，没有不失败
          fail_on_unmatched_files: false
          files: |
            release/DBPanda-Setup-${{ steps.version.outputs.version }}.exe
            release/DBPanda-Setup-${{ steps.version.outputs.version }}.zip
            release/DBPanda-Setup-${{ steps.version.outputs.version }}.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}