<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'">
  <title>DBPanda</title>
  <link rel="stylesheet" href="../../node_modules/codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="../../node_modules/codemirror/addon/hint/show-hint.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div id="menubar"></div>
    <div id="toolbar"></div>
    <div id="main">
      <div id="sidebar">
        <div id="sidebar-head">
          <input id="tree-filter" type="text" placeholder="搜索连接 / 表…" spellcheck="false">
        </div>
        <div id="tree"></div>
      </div>
      <div id="splitter-v" title="拖动调整宽度"></div>
      <div id="content">
        <div id="tabbar"></div>
        <div id="tabpanes"></div>
      </div>
    </div>
    <div id="statusbar">
      <span id="status-left">就绪</span>
      <span id="status-right"></span>
    </div>
  </div>

  <script src="../../node_modules/codemirror/lib/codemirror.js"></script>
  <script src="../../node_modules/codemirror/mode/sql/sql.js"></script>
  <script src="../../node_modules/codemirror/addon/hint/show-hint.js"></script>
  <script src="../../node_modules/codemirror/addon/hint/sql-hint.js"></script>
  <script src="../../node_modules/codemirror/addon/edit/matchbrackets.js"></script>
  <script src="../../node_modules/codemirror/addon/edit/closebrackets.js"></script>
  <script src="../../node_modules/codemirror/addon/selection/active-line.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
